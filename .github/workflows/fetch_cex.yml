name: Fetch CEX Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.3'

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("httr", "jsonlite"), repos="https://cloud.r-project.org")'

      - name: Fetch CEX data
        run: Rscript cex_fetcher.R

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cex_cache.rds
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update CEX cache $(date -u +%H:%M)" && git pull --rebase && git push)
